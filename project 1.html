<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divya's Electronics Store</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Poppins', sans-serif;
}

body{
  background:#f4f6f9;
}

header{
  background:#0f172a;
  color:#fff;
  padding:20px;
  text-align:center;
}

header h1{
  font-size:28px;
}

nav{
  background:#1e293b;
  display:flex;
  justify-content:center;
  gap:20px;
  padding:10px;
}

nav a{
  color:#fff;
  text-decoration:none;
  font-size:16px;
}

nav a:hover{
  color:#38bdf8;
}

.hero{
  background:url('https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5') no-repeat center/cover;
  height:300px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

.hero h2{
  background:rgba(0,0,0,0.6);
  padding:10px 20px;
}

.section{
  padding:40px 20px;
}

.section h2{
  text-align:center;
  margin-bottom:20px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card h3{
  margin:10px 0;
}

.card button{
  background:#0ea5e9;
  color:white;
  border:none;
  padding:10px;
  border-radius:5px;
  cursor:pointer;
}

.card button:hover{
  background:#0284c7;
}

.contact{
  background:#e2e8f0;
  padding:30px;
}

.contact form{
  max-width:400px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.contact input, .contact textarea{
  padding:10px;
  border:1px solid #ccc;
  border-radius:5px;
}

.contact button{
  background:#0f172a;
  color:white;
  padding:10px;
  border:none;
  border-radius:5px;
}

footer{
  background:#0f172a;
  color:white;
  text-align:center;
  padding:15px;
}
</style>
</head>

<body>

<header>
  <h1> Electronics Store</h1>
  <p>Your One Stop Shop for Gadgets</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#products">Products</a>
  <a href="#contact">Contact</a>
</nav>

<div class="hero">
  <h2>Latest Electronics Deals</h2>
</div>

<section class="section" id="products">
  <h2>Our Products</h2>
  <div class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
      <h3>Smartphone</h3>
      <p>₹15,000</p>
      <button>Buy Now</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
      <h3>Laptop</h3>
      <p>₹45,000</p>
      <button>Buy Now</button>
    </div>

    <div class="card">
      <img src="https://m.media-amazon.com/images/I/61RahTQtAqL._AC_UF1000,1000_QL80_.jpg">
      <h3>Headphones</h3>
      <p>₹2,000</p>
      <button>Buy Now</button>
    </div>

    <div class="card">
      <img src="https://gourban.in/cdn/shop/files/Pulse.jpg?v=1749553994&width=2048">
      <h3>Smart Watch</h3>
      <p>₹3,500</p>
      <button>Buy Now</button>
    </div>

  </div>
</section>

<section class="contact" id="contact">
  <h2 style="text-align:center;">Contact Me</h2>
  <form>
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <textarea rows="4" placeholder="Your Message"></textarea>
    <button type="submit">Send Message</button>
  </form>
</section>

<footer>
  <p>© 2026 Divya | Electronics Portfolio</p>
</footer>

</body>
</html>
